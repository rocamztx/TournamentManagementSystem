server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# Configuracoes do PostgreSQL. O banco fica no PC servidor e preserva os dados
# quando a API for fechada e aberta novamente.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/obr_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:0207}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Chave usada pelo app Flutter para gravar/alterar pontuacoes.
app.api-key=${APP_API_KEY:OBR2026_ROBOTICA_ELITE}
